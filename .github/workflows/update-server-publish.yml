name: Notify Update Server

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Notify update server
      env:
        UPDATE_SERVER_URL: ${{ secrets.UPDATE_SERVER_URL }}
        EVERYWHERE_RELEASE_ADMIN_SECRET: ${{ secrets.EVERYWHERE_RELEASE_ADMIN_SECRET }}
        GITHUB_TOKEN: ${{ github.token }}
      run: node scripts/update-server-publish.mjs
