name: (Linux) Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - runtime: linux-x64
            runner: ubuntu-latest
            asset_name: Linux-x64
          - runtime: linux-arm64
            runner: ubuntu-24.04-arm
            asset_name: Linux-arm64

    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: true
        lfs: true

    - name: Verify Tag (Manual Trigger)
      if: github.event_name == 'workflow_dispatch'
      run: |
        TAG=$(git describe --exact-match --tags HEAD 2>/dev/null || echo "")
        if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
          echo "Error: Current commit is not tagged with a valid version (vX.X.X)."
          echo "Current tag: $TAG"
          exit 1
        fi
        echo "Found valid tag: $TAG"
        echo "VERSION=${TAG#v}" >> $GITHUB_ENV
        echo "GITHUB_REF=refs/tags/$TAG" >> $GITHUB_ENV

    - name: Get version from tag
      if: github.event_name != 'workflow_dispatch'
      id: get_version
      run: |
        echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: |
        dotnet restore Everywhere.Linux.slnf \
          -r ${{ matrix.runtime }}

    - name: Publish
      env:
        CODE_SIGN_KEY: ${{ secrets.CODE_SIGN_KEY }}
        PACKAGE_SIGNING_KEY: ${{ secrets.PACKAGE_SIGNING_KEY }}
        SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        AI_GATEWAY_BASE_URL: ${{ vars.AI_GATEWAY_BASE_URL }}
        ACCOUNT_BASE_URL: ${{ vars.ACCOUNT_BASE_URL }}
        CLOUD_SYNC_BASE_URL: ${{ vars.CLOUD_SYNC_BASE_URL }}
      run: |
        dotnet publish src/Everywhere.Linux/Everywhere.Linux.csproj \
          -c Release \
          -r ${{ matrix.runtime }} \
          -o ./publish \
          -p:Version="$env:VERSION" \
          /p:SentryDsn="$SENTRY_DSN" \
          /p:ClientId="$CLIENT_ID" \
          /p:AIGatewayBaseUrl="$AI_GATEWAY_BASE_URL" \
          /p:AccountBaseUrl="$ACCOUNT_BASE_URL" \
          /p:CloudSyncBaseUrl="$CLOUD_SYNC_BASE_URL" \
          --self-contained true \
          --no-restore

    - name: Build Deb Package
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      run: |
        chmod +x ./src/Everywhere.Linux/packaging_deb.sh
        ./src/Everywhere.Linux/packaging_deb.sh ${{ matrix.runtime }} ${{ env.VERSION }} ./publish

    - name: Install AppImage Build Dependencies
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools libfuse2

    - name: Create Archive
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      run: |
        sudo apt-get update && sudo apt-get install -y zstd
        tar -I 'zstd -19 -T0' -cf Everywhere-${{ matrix.asset_name }}-v${{ env.VERSION }}.tar.zst -C ./publish .

    - name: Build AppImage
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      run: |
        chmod +x build-appimage.sh
        ./build-appimage.sh ${{ matrix.runtime }} ${{ matrix.asset_name }} ./publish false ${{ env.VERSION }}

    - name: Upload Release Assets
      if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        make_latest: true
        tag_name: v${{ env.VERSION }}
        files: |
          Everywhere-${{ matrix.asset_name }}-v${{ env.VERSION }}.deb
          Releases/Everywhere-${{ matrix.asset_name }}-v${{ env.VERSION }}.AppImage
          Everywhere-${{ matrix.asset_name }}-v${{ env.VERSION }}.tar.zst
