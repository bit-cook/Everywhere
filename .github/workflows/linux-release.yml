name: (Linux) Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - runtime: linux-x64
            runner: ubuntu-latest
            asset_name: Linux-x64
          - runtime: linux-arm64
            runner: ubuntu-24.04-arm
            asset_name: Linux-arm64

    runs-on: ${{ matrix.runner }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
        lfs: true

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Resolve version
      run: node scripts/resolve-release-tag.mjs "$GITHUB_REF_NAME"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5.2.0
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: |
        dotnet restore Everywhere.Linux.slnx \
          -r ${{ matrix.runtime }}

    - name: Publish
      env:
        CODE_SIGN_KEY: ${{ secrets.CODE_SIGN_KEY }}
        PACKAGE_SIGNING_KEY: ${{ secrets.PACKAGE_SIGNING_KEY }}
        SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        CLIENT_ID: ${{ secrets.CLIENT_ID }}
        AI_GATEWAY_BASE_URL: ${{ vars.AI_GATEWAY_BASE_URL }}
        ACCOUNT_BASE_URL: ${{ vars.ACCOUNT_BASE_URL }}
        CLOUD_SYNC_BASE_URL: ${{ vars.CLOUD_SYNC_BASE_URL }}
      run: |
        dotnet publish src/Everywhere.Linux/Everywhere.Linux.csproj \
          -c Release \
          -r ${{ matrix.runtime }} \
          -o ./publish \
          -p:Version="$VERSION_PREFIX" \
          -p:SemanticVersion="$SEMANTIC_VERSION" \
          /p:SentryDsn="$SENTRY_DSN" \
          /p:ClientId="$CLIENT_ID" \
          /p:AIGatewayBaseUrl="$AI_GATEWAY_BASE_URL" \
          /p:AccountBaseUrl="$ACCOUNT_BASE_URL" \
          /p:CloudSyncBaseUrl="$CLOUD_SYNC_BASE_URL" \
          --self-contained true \
          --no-restore

    - name: Build Deb Package
      run: |
        chmod +x ./src/Everywhere.Linux/packaging_deb.sh
        ./src/Everywhere.Linux/packaging_deb.sh ${{ matrix.runtime }} ${{ env.VERSION }} ./publish

    - name: Install AppImage Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools libfuse2

    - name: Create Archive
      run: |
        sudo apt-get update && sudo apt-get install -y zstd
        tar -I 'zstd -19 -T0' -cf Everywhere-${{ matrix.asset_name }}-v${{ env.VERSION }}.tar.zst -C ./publish .

    - name: Build AppImage
      run: |
        chmod +x build-appimage.sh
        ./build-appimage.sh ${{ matrix.runtime }} ${{ matrix.asset_name }} ./publish false ${{ env.VERSION }}

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v3
      with:
        draft: true
        make_latest: false
        prerelease: ${{ env.PRERELEASE }}
        generate_release_notes: ${{ env.PRERELEASE }}
        tag_name: ${{ env.RELEASE_TAG }}
        files: |
          Everywhere-${{ matrix.asset_name }}-v${{ env.VERSION }}.deb
          Releases/Everywhere-${{ matrix.asset_name }}-v${{ env.VERSION }}.AppImage
          Everywhere-${{ matrix.asset_name }}-v${{ env.VERSION }}.tar.zst
